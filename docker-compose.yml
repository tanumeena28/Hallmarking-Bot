version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nch_audit
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/nch_audit
      - GROQ_API_KEY=$GROQ_API_KEY
      - LLM_PROVIDER=groq
      - JWT_SECRET=supersecretkey_change_in_production
    volumes:
      - ./data:/data
    depends_on:
      - db

  management-ui:
    build: ./management-ui
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
